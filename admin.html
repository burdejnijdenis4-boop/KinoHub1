<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinoHub - Адмін-панель</title>
    <style>
        /* Базові стилі */
        body { background: #0a0f1e; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }

        /* Екран входу */
        #login-screen { 
            position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #0a0f1e; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 9999; 
        }
        .login-box { 
            background: #1a2233; padding: 30px; border-radius: 15px; 
            border: 1px solid #4a90e2; text-align: center; width: 300px; 
        }
        .login-box input { 
            width: 100%; padding: 10px; margin-bottom: 10px; 
            border-radius: 5px; border: none; background: #000; 
            color: white; box-sizing: border-box; 
        }

        /* Екран вибору режиму керування */
        #choice-screen {
            position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #0a0f1e; 
            display: none; justify-content: center; align-items: center; 
            z-index: 9998;
        }
        .choice-box {
            background: #1a2233; padding: 40px; border-radius: 15px; 
            border: 1px solid #4a90e2; text-align: center; width: 400px;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn-choice {
            background: #4a90e2; color: white; border: none; padding: 18px;
            border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-choice:hover { background: #357abd; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3); }

        /* УНІФІКОВАНА КНОПКА "НАЗАД" */
        .back-login-btn, .back-link {
            display: inline-block;
            padding: 10px 20px;
            background-color: #1a2233; 
            border: 1px solid #4a90e2; 
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
            cursor: pointer;
        }
        .back-login-btn:hover, .back-link:hover {
            background-color: #1a2233;
            color: #ffd700;    
            border-color: #ffd700; 
            transform: translateY(-2px);
        }

        .back-login-btn { position: absolute; top: 40px; left: 40px; z-index: 1000; }
        .back-link { margin-bottom: 20px; }

        /* Адмін-інтерфейси */
        #admin-interface, #users-interface { display: none; max-width: 800px; margin: 0 auto; margin-top: 20px; }
        .admin-container { background: rgba(20, 25, 40, 0.95); border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #4a90e2; }
        h1 { color: #4a90e2; text-align: center; margin-top: 0; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 25px; border-bottom: 2px solid #222; padding-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { background: #111; border: 1px solid #444; color: #aaa; padding: 10px 15px; border-radius: 8px; cursor: pointer; flex: 1; text-align: center; }
        .tab-btn.active { background: #4a90e2; color: white; border-color: #4a90e2; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-group { margin-bottom: 15px; }
        label { display: block; color: #ffd700; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; background: #111; border: 1px solid #444; color: white; box-sizing: border-box; }
        .file-upload-wrapper { border: 1px dashed #4a90e2; padding: 10px; margin-bottom: 5px; border-radius: 8px; text-align: center; }
        
        .btn-submit { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-danger { background: #e74c3c; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* СТИЛІ ПОШУКУ КОРИСТУВАЧІВ */
        .search-wrapper { position: relative; margin-bottom: 10px; }
        .search-wrapper input { padding-left: 40px; font-size: 16px; border-color: #9b59b6; }
        .search-wrapper input:focus { border-color: #ffd700; outline: none; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 18px; color: #888; }
        
        .user-list-container { max-height: 200px; overflow-y: auto; background: #000; border: 1px solid #444; border-radius: 8px; }
        .user-list-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #222; color: #cbd5e1; transition: 0.2s; }
        .user-list-item:last-child { border-bottom: none; }
        .user-list-item:hover { background: #9b59b6; color: white; }
        .user-list-item.active { background: #8e44ad; color: white; font-weight: bold; border-left: 4px solid #ffd700; }

        /* Елементи списку інвентаря */
        .admin-inventory-list { background: #111; border: 1px solid #444; border-radius: 8px; padding: 15px; margin: 0; list-style-type: none; max-height: 200px; overflow-y: auto; }
        .admin-inventory-list li { padding: 8px 0; border-bottom: 1px solid #222; font-size: 14px; color: #cbd5e1; }
        .admin-inventory-list li:last-child { border-bottom: none; }

        #loader { display: none; text-align: center; color: #ffd700; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <a href="index.html" class="back-login-btn"> Повернутися на головну </a>
        <div class="login-box">
            <h2>Вхід в адмінку</h2>
            <input type="password" id="pass-input" placeholder="Введіть пароль">
            <button class="btn-submit" onclick="checkLogin()">Увійти</button>
        </div>
    </div>

    <div id="choice-screen">
        <div class="choice-box">
            <h2 style="color: #ffd700; margin-bottom: 10px;">Оберіть розділ керування</h2>
            <button class="btn-choice" onclick="openMoviesAdmin()">🎬 Керування фільмами</button>
            <button class="btn-choice" onclick="openUsersAdmin()" style="background: #9b59b6;">👥 Керування користувачами</button>
            <a href="index.html" style="color: #aaa; text-decoration: none; margin-top: 10px; font-size: 14px;">Повернутися на сайт</a>
        </div>
    </div>

    <div id="admin-interface">
        <div class="admin-container">
            <button class="back-link" onclick="goBackToChoice()">← Змінити розділ адмінки</button>
            <h1>🎬 Панель керування фільмами</h1>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('tab-add', this)">🎬 Додати</button>
                <button class="tab-btn" onclick="showTab('tab-edit', this)">✏️ Редагувати</button>
                <button class="tab-btn" onclick="showTab('tab-carousel', this)">🖼️ Карусель</button>
            </div>

            <div id="tab-add" class="tab-content active">
                <form id="form-add">
                    <div class="form-group"><label>Назва:</label><input type="text" id="m-title" required></div>
                    <div class="form-group"><label>Рік:</label><input type="number" id="m-year" value="2026"></div>
                    <div class="form-group"><label>Рейтинг (від 0 до 10):</label><input type="number" id="m-rating" min="0" max="10" step="0.1" placeholder="8.5" required></div>
                    <div class="form-group"><label>Постер (URL):</label><input type="url" id="m-img" required></div>
                    <div class="form-group">
                        <label>🎬 Відео (URL або Файл з ПК):</label>
                        <div class="file-upload-wrapper"><input type="file" id="m-file-selector" accept="video/mp4"></div>
                        <input type="text" id="m-video" placeholder="Посилання або назва файлу" required>
                    </div>
                    <div class="form-group"><label>Якість (напр. FullHD 1080p):</label><input type="text" id="m-quality" required></div>
                    <div class="form-group"><label>Жанри (через кому):</label><input type="text" id="m-genre" placeholder="Бойовик, Драма, Комедія" required></div>
                    <div class="form-group"><label>Країна:</label><input type="text" id="m-country" placeholder="США, Україна" required></div>
                    <div class="form-group"><label>Опис:</label><textarea id="m-desc" rows="3"></textarea></div>
                    <button type="submit" class="btn-submit">➕ Додати фільм</button>
                </form>
            </div>

            <div id="tab-edit" class="tab-content">
                <div class="form-group">
                    <label>Оберіть фільм:</label>
                    <select id="edit-select" onchange="loadMovieToEdit()"><option value="">-- Завантаження --</option></select>
                </div>
                <div id="edit-fields" style="display:none;">
                    <div class="form-group"><label>Назва:</label><input type="text" id="e-title"></div>
                    <div class="form-group"><label>Рік:</label><input type="number" id="e-year"></div>
                    <div class="form-group"><label>Рейтинг (0-10):</label><input type="number" id="e-rating" min="0" max="10" step="0.1"></div>
                    <div class="form-group"><label>Постер (URL):</label><input type="url" id="e-img"></div>
                    <div class="form-group"><label>Відео:</label><input type="text" id="e-video"></div>
                    <div class="form-group"><label>Якість:</label><input type="text" id="e-quality"></div>
                    <div class="form-group"><label>Жанри (через кому):</label><input type="text" id="e-genre"></div>
                    <div class="form-group"><label>Країна:</label><input type="text" id="e-country"></div>
                    <div class="form-group"><label>Опис:</label><textarea id="e-desc" rows="3"></textarea></div>
                    <button class="btn-submit" onclick="saveChanges()">💾 Зберегти зміни</button>
                    <button class="btn-danger" onclick="deleteMovie()">🗑️ Видалити фільм</button>
                </div>
            </div>

            <div id="tab-carousel" class="tab-content">
                <form id="form-carousel">
                    <div class="form-group"><label>ID Каруселі (номер слайда):</label><input type="number" id="c-id" required></div>
                    <div class="form-group"><label>Зображення (URL):</label><input type="url" id="c-img" required></div>
                    <button type="submit" class="btn-submit">💾 Оновити карусель</button>
                </form>
            </div>
        </div>
    </div>

    <div id="users-interface">
        <div class="admin-container" style="border-color: #9b59b6;">
            <button class="back-link" onclick="goBackToChoice()" style="border-color: #9b59b6;">← Змінити розділ адмінки</button>
            <h1 style="color: #9b59b6;">👥 Керування користувачами</h1>

            <div class="form-group">
                <label style="color: #9b59b6;">Пошук та вибір користувача:</label>
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="user-search" placeholder="Введіть нікнейм для пошуку..." oninput="filterUsers()">
                </div>
                <div id="user-list-container" class="user-list-container">
                    </div>
            </div>

            <div id="user-fields" style="display: none; margin-top: 20px; border-top: 1px solid #444; padding-top: 20px;">
                <h3 style="color: #ffd700; margin-top: 0; margin-bottom: 15px;">👤 Профіль: <span id="u-username-display" style="color: #fff;"></span></h3>
                
                <div class="form-group"><label>Пароль акаунту:</label><input type="text" id="u-password"></div>
                <div class="form-group"><label>💰 Баланс монет:</label><input type="number" id="u-balance"></div>
                
                <div class="form-group">
                    <label>🔥 Статус користувача:</label>
                    <select id="u-status">
                        <option value="Кіноман">Кіноман</option>
                        <option value="Критик">Критик</option>
                        <option value="Режисер">Режисер</option>
                        <option value="Попкорноїд">Попкорноїд</option>
                        <option value="Серіальний Гуру">Серіальний Гуру</option>
                        <option value="VIP Глядач">VIP Глядач</option>
                    </select>
                </div>

                <div class="form-group"><label>Посилання на аватарку (URL):</label><input type="url" id="u-avatar"></div>
                <div class="form-group"><label>Посилання на банер шпалер (URL або Хеш):</label><input type="text" id="u-banner"></div>

                <div class="form-group">
                    <label style="color: #4a90e2;">🛍️ Куплені шпалери та теми (Інвентар):</label>
                    <ul id="u-inventory-list" class="admin-inventory-list">
                        </ul>
                </div>

                <button class="btn-submit" onclick="saveUserChanges()" style="background: #27ae60; margin-top: 20px;">💾 Зберегти зміни профілю</button>
                <button class="btn-danger" onclick="deleteUserProfile()" style="background: #c0392b;">🗑️ Повністю видалити профіль</button>
            </div>
            
            <div id="loader">⏳ Синхронізація з хмарою...</div>
        </div>
    </div>

    <script>
        // Твої ключі
        const CLOUD_API_KEY = '$2a$10$2XqOLrSsXthcKg925l/Sk.6PqMKbqGF/XzRytUJtSw29fDlVNGouq'; 
        const USERS_BIN_ID = '6a2da741da38895dfebb4bcf'; 

        let movies = [];
        let cloudUsers = {}; 
        let currentSelectedUser = ""; // Зберігає нікнейм обраного користувача

        // 1. НАВІГАЦІЯ ТА ЛОГІН
        function checkLogin() {
            if(document.getElementById('pass-input').value === 'kino2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('choice-screen').style.display = 'flex';
            } else { alert('Невірний пароль!'); }
        }

        function openMoviesAdmin() {
            document.getElementById('choice-screen').style.display = 'none';
            document.getElementById('admin-interface').style.display = 'block';
            fetchData(); 
        }

        function openUsersAdmin() {
            document.getElementById('choice-screen').style.display = 'none';
            document.getElementById('users-interface').style.display = 'block';
            fetchCloudUsers(); 
        }

        function goBackToChoice() {
            document.getElementById('admin-interface').style.display = 'none';
            document.getElementById('users-interface').style.display = 'none';
            document.getElementById('choice-screen').style.display = 'flex';
        }

        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // 2. ЛОГІКА ФІЛЬМІВ (БЕЗ ЗМІН)
        async function fetchData() {
            try {
                const res = await fetch('/api/admin/movies');
                movies = await res.json();
                updateSelect();
            } catch(e) { console.log("Фільми працюють локально"); }
        }
        async function save() { alert("Сервер фільмів офлайн. Підключіть хмару."); }
        function updateSelect() {}
        function loadMovieToEdit() {}
        function saveChanges() {}
        function deleteMovie() {}

        // ==========================================================
        // 3. КЕРУВАННЯ КОРИСТУВАЧАМИ (ПОШУК ТА ІНВЕНТАР)
        // ==========================================================
        async function fetchCloudUsers() {
            document.getElementById('loader').style.display = 'block';
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${USERS_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': CLOUD_API_KEY, 'Cache-Control': 'no-cache' }
                });
                const result = await response.json();
                cloudUsers = result.record;
                renderUserList(); // Малюємо список після завантаження
            } catch (err) {
                alert('Помилка отримання профілів із хмари.');
            }
            document.getElementById('loader').style.display = 'none';
        }

        // Функція для відмальовки списку користувачів (з урахуванням пошуку)
        function renderUserList(filterText = "") {
            const container = document.getElementById('user-list-container');
            container.innerHTML = '';
            const lowerFilter = filterText.toLowerCase();

            for (let username in cloudUsers) {
                if (username.toLowerCase().includes(lowerFilter)) {
                    const div = document.createElement('div');
                    // Додаємо клас active, якщо цей користувач зараз обраний
                    div.className = 'user-list-item' + (username === currentSelectedUser ? ' active' : '');
                    div.textContent = username;
                    
                    // При кліку на ім'я — обираємо його і завантажуємо профіль
                    div.onclick = () => selectUser(username);
                    container.appendChild(div);
                }
            }
            
            if(container.innerHTML === '') {
                container.innerHTML = '<div style="padding: 12px; color: #888; text-align: center;">Нікого не знайдено</div>';
            }
        }

        // Спрацьовує при кожному введенні символу в рядок пошуку
        function filterUsers() {
            const text = document.getElementById('user-search').value;
            renderUserList(text);
        }

        // Обробка кліку по користувачу в списку
        function selectUser(username) {
            currentSelectedUser = username;
            renderUserList(document.getElementById('user-search').value); // Перемальовуємо, щоб підсвітити обраного
            loadUserProfile(username);
        }

        // Завантаження даних обраного користувача в поля форми
        function loadUserProfile(username) {
            document.getElementById('user-fields').style.display = 'block';
            const user = cloudUsers[username];

            document.getElementById('u-username-display').innerText = username;
            document.getElementById('u-password').value = user.password || '';
            document.getElementById('u-balance').value = user.balance !== undefined ? user.balance : 10;
            document.getElementById('u-status').value = user.status || 'Кіноман';
            document.getElementById('u-avatar').value = user.avatar || '';
            document.getElementById('u-banner').value = user.banner || '';

            // --- ВІДОБРАЖЕННЯ ІНВЕНТАРЮ ---
            const invContainer = document.getElementById('u-inventory-list');
            invContainer.innerHTML = '';
            
            if (user.inventory && user.inventory.length > 0) {
                user.inventory.forEach(item => {
                    // Витягуємо id, name та url з масиву інвентарю JSON
                    invContainer.innerHTML += `
                        <li>
                            <b style="color: #4a90e2;">[ID: ${item.id}]</b> — <b style="color: #fff;">${item.name}</b><br>
                            <span style="color: #888; font-size: 12px;">Посилання/Колір:</span> <span style="color: #ffd700; font-size: 12px;">${item.url}</span>
                        </li>`;
                });
            } else {
                invContainer.innerHTML = '<li>📂 Сховище порожнє. Користувач ще не купував тем чи шпалер.</li>';
            }
        }

        // Збереження змін у хмару
        async function saveUserChanges() {
            const username = currentSelectedUser;
            if (!username) return;

            cloudUsers[username].password = document.getElementById('u-password').value;
            cloudUsers[username].balance = Number(document.getElementById('u-balance').value);
            cloudUsers[username].status = document.getElementById('u-status').value;
            cloudUsers[username].avatar = document.getElementById('u-avatar').value;
            cloudUsers[username].banner = document.getElementById('u-banner').value;

            document.getElementById('loader').style.display = 'block';
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${USERS_BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': CLOUD_API_KEY },
                    body: JSON.stringify(cloudUsers)
                });
                alert('✅ Дані користувача успішно оновлено!');
            } catch (err) { alert('Помилка запису!'); }
            document.getElementById('loader').style.display = 'none';
        }

        // Видалення користувача
        async function deleteUserProfile() {
            const username = currentSelectedUser;
            if (!username) return;

            if (confirm(`⚠ Ви дійсно бажаєте ПОВНІСТЮ видалити акаунт "${username}"?`)) {
                delete cloudUsers[username]; 
                
                document.getElementById('loader').style.display = 'block';
                try {
                    await fetch(`https://api.jsonbin.io/v3/b/${USERS_BIN_ID}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-Master-Key': CLOUD_API_KEY },
                        body: JSON.stringify(cloudUsers)
                    });
                    
                    currentSelectedUser = "";
                    document.getElementById('user-fields').style.display = 'none';
                    document.getElementById('user-search').value = "";
                    renderUserList(); 
                    alert('Акаунт видалено.');
                } catch (err) { alert('Помилка видалення!'); }
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>

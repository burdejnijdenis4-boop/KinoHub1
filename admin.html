<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinoHub - Адмін-панель</title>
    <style>
        body { background: #0a0f1e; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        #login-screen, #choice-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0f1e; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        #choice-screen { display: none; z-index: 9998; }
        .login-box, .choice-box { background: #1a2233; padding: 30px; border-radius: 15px; border: 1px solid #4a90e2; text-align: center; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .choice-box { width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .login-box input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; background: #000; color: white; box-sizing: border-box; }
        .btn { background: #4a90e2; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:hover { background: #357abd; }
        .btn-choice { background: #4a90e2; color: white; border: none; padding: 18px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.3s ease; }
        .btn-choice:hover { background: #357abd; transform: translateY(-2px); }
        .back-btn { position: absolute; top: 20px; left: 20px; background: #1a2233; border: 1px solid #4a90e2; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; text-decoration: none; }
        .back-btn:hover { color: #ffd700; border-color: #ffd700; }
        #admin-interface, #users-interface { display: none; max-width: 800px; margin: 0 auto; margin-top: 50px; }
        .admin-container { background: rgba(20, 25, 40, 0.95); border-radius: 15px; padding: 30px; border: 1px solid #4a90e2; }
        h1 { color: #4a90e2; text-align: center; margin-top: 0; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #222; padding-bottom: 10px; }
        .tab-btn { background: #111; border: 1px solid #444; color: #aaa; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; text-align: center; }
        .tab-btn.active { background: #4a90e2; color: white; border-color: #4a90e2; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; color: #ffd700; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
        .loader { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px; background: rgba(0,0,0,0.9); border: 1px solid #4a90e2; border-radius: 10px; color: #ffd700; font-weight: bold; z-index: 10000; box-shadow: 0 0 20px rgba(74, 144, 226, 0.5); }
        
        .upload-row { display: flex; gap: 10px; align-items: center; margin-top: 5px; }
        .btn-upload { background: #2d3748; color: #a0aec0; border: 1px dashed #4a5568; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; font-size: 13px; white-space: nowrap; }
        .btn-upload:hover { background: #4a5568; color: white; border-color: #4a90e2; }
        .progress-container { display: none; width: 100%; background: #111; border-radius: 5px; height: 8px; margin-top: 5px; overflow: hidden; border: 1px solid #333; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #4a90e2, #00ffcc); transition: width 0.2s ease; }
        .upload-status { font-size: 12px; color: #a0aec0; margin-top: 2px; display: none; }
    </style>
</head>
<body>

    <div id="loader" class="loader">⏳ Синхронізація з хмарною базою...</div>

    <div id="login-screen">
        <a href="index.html" class="back-btn">❮ На сайт</a>
        <div class="login-box">
            <h2 style="color: #4a90e2;">KinoHub Admin</h2>
            <input type="password" id="admin-pass" placeholder="Введіть пароль...">
            <button class="btn" onclick="checkAdminPassword()">Увійти</button>
        </div>
    </div>

    <div id="choice-screen">
        <a href="#" class="back-btn" onclick="logoutAdmin()">❮ Вийти</a>
        <div class="choice-box">
            <h2 style="color: #ffd700; margin-top: 0;">Що будемо налаштовувати?</h2>
            <button class="btn-choice" onclick="openInterface('movies')">🎬 Керування Фільмами</button>
            <button class="btn-choice" onclick="openInterface('users')">👥 Керування Користувачами</button>
        </div>
    </div>

    <div id="admin-interface">
        <a href="#" class="back-btn" onclick="backToChoice()">❮ Назад до меню</a>
        <div class="admin-container">
            <h1>🎬 Керування Фільмами</h1>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchMovieTab('add')">Додати новий фільм</button>
                <button class="tab-btn" onclick="switchMovieTab('edit')">Редагувати / Видалити</button>
            </div>

            <div id="tab-add" class="tab-content active">
                <div class="form-group"><label>Назва фільму:</label><input type="text" id="add-title" placeholder="Наприклад: Інтерстеллар"></div>
                <div class="form-group"><label>Рік:</label><input type="text" id="add-year" placeholder="2014"></div>
                <div class="form-group"><label>Жанр:</label><input type="text" id="add-genre" placeholder="Фантастика"></div>
                <div class="form-group"><label>Теги (через кому):</label><input type="text" id="add-tags" placeholder="Космос, Драма, Науковий"></div>
                <div class="form-group"><label>URL Постера:</label><input type="text" id="add-poster" placeholder="https://..."></div>
                
                <div class="form-group">
                    <label style="color: #4a90e2;">🔗 Відео-плеєр / YouTube (1080p):</label>
                    <div class="upload-row">
                        <input type="text" id="add-video-1080" placeholder="Вставте YouTube лінк">
                    </div>
                </div>

                <div class="form-group">
                    <label style="color: #28a745;">🔗 Відео-плеєр / YouTube (720p):</label>
                    <div class="upload-row">
                        <input type="text" id="add-video-720" placeholder="Вставте YouTube лінк">
                    </div>
                </div>

                <div class="form-group">
                    <label style="color: #e5c158;">📁 Пряме відео MP4 (1080p):</label>
                    <div class="upload-row">
                        <input type="text" id="add-media-1080" placeholder="Лінк на .mp4 або завантажте">
                        <label class="btn-upload" for="file-add-media-1080">📁 Файл комп'ютера</label>
                        <input type="file" id="file-add-media-1080" accept="video/mp4,video/*" style="display:none;" onchange="simulateVideoUpload(this, 'add-media-1080', 'progress-add-media-1080', 'status-add-media-1080')">
                    </div>
                    <div id="progress-add-media-1080" class="progress-container"><div class="progress-bar"></div></div>
                    <div id="status-add-media-1080" class="upload-status"></div>
                </div>

                <div class="form-group">
                    <label style="color: #e5c158;">📁 Пряме відео MP4 (720p):</label>
                    <div class="upload-row">
                        <input type="text" id="add-media-720" placeholder="Лінк на .mp4 або завантажте">
                        <label class="btn-upload" for="file-add-media-720">📁 Файл комп'ютера</label>
                        <input type="file" id="file-add-media-720" accept="video/mp4,video/*" style="display:none;" onchange="simulateVideoUpload(this, 'add-media-720', 'progress-add-media-720', 'status-add-media-720')">
                    </div>
                    <div id="progress-add-media-720" class="progress-container"><div class="progress-bar"></div></div>
                    <div id="status-add-media-720" class="upload-status"></div>
                </div>
                
                <div class="form-group"><label>Опис:</label><textarea id="add-desc" rows="4" placeholder="Короткий опис фільму..."></textarea></div>
                
                <div class="form-group">
                    <label>Рейтинг (0-10):</label>
                    <input type="text" id="add-rating" placeholder="Наприклад: 9">
                </div>
                
                <button class="btn" style="background: #28a745;" onclick="addMovie()">➕ Зберегти фільм в базу</button>
            </div>

            <div id="tab-edit" class="tab-content">
                <div class="form-group">
                    <label>🔍 Пошук фільму:</label>
                    <input type="text" id="edit-movie-search" placeholder="Почніть вводити назву..." oninput="filterEditMovies()">
                </div>
                <div class="form-group">
                    <label>Оберіть фільм зі списку:</label>
                    <select id="edit-select" onchange="loadMovieData()">
                        <option value="">-- Завантаження бази... --</option>
                    </select>
                </div>
                
                <hr style="border-color: #333; margin: 20px 0;">

                <div id="edit-form" style="display: none;">
                    <div class="form-group"><label>Назва:</label><input type="text" id="edit-title"></div>
                    <div class="form-group"><label>Рік:</label><input type="text" id="edit-year"></div>
                    <div class="form-group"><label>Жанр:</label><input type="text" id="edit-genre"></div>
                    <div class="form-group"><label>Теги:</label><input type="text" id="edit-tags"></div>
                    <div class="form-group"><label>Постер URL:</label><input type="text" id="edit-poster"></div>
                    
                    <div class="form-group"><label>🔗 Відео-плеєр / YouTube (1080p):</label><input type="text" id="edit-video-1080"></div>
                    <div class="form-group"><label>🔗 Відео-плеєр / YouTube (720p):</label><input type="text" id="edit-video-720"></div>

                    <div class="form-group"><label>Опис:</label><textarea id="edit-desc" rows="4"></textarea></div>
                    
                    <div class="form-group">
                        <label>Рейтинг (0-10):</label>
                        <input type="text" id="edit-rating">
                    </div>
                    
                    <button class="btn" style="background: #e67e22; margin-bottom: 10px;" onclick="saveEditMovie()">💾 Зберегти зміни</button>
                    <button class="btn" style="background: #dc3545;" onclick="deleteMovie()">🗑 Видалити фільм</button>
                </div>
            </div>
        </div>
    </div>

    <div id="users-interface">
        <a href="#" class="back-btn" onclick="backToChoice()">❮ Назад до меню</a>
        <div class="admin-container">
            <h1>👥 Керування Користувачами</h1>
            <div class="form-group">
                <label>🔍 Пошук користувача:</label>
                <input type="text" id="user-search" placeholder="Почніть вводити ім'я..." oninput="filterUsers()">
            </div>
            <div class="form-group">
                <label>Оберіть користувача:</label>
                <select id="user-select" onchange="loadUserData()">
                    <option value="">-- Завантаження бази... --</option>
                </select>
            </div>
            <div id="user-form" style="display: none;">
                <div class="form-group"><label>Баланс:</label><input type="number" id="user-balance"></div>
                <button class="btn" style="background: #e67e22; margin-bottom: 10px;" onclick="saveUserBalance()">💾 Зберегти баланс</button>
                <button class="btn" style="background: #dc3545;" onclick="deleteUser()">🗑 Видалити акаунт</button>
            </div>
        </div>
    </div>

    <script>
        // === ВАЖЛИВО! Встав сюди свій API-ключ від JSONBin ===
        const CLOUD_API_KEY = 'ВСТАВ_СЮДИ_СВІЙ_ПРАВИЛЬНИЙ_API_КЛЮЧ'; 
        
        const MOVIES_BIN_ID = '6a30d6c1da38895dfec7a3be';
        const USERS_BIN_ID = '6a2da741da38895dfebb4bcf'; 

        let cloudMovies = [];
        let cloudUsers = {};
        let currentSelectedUser = "";

        // ================= НАВІГАЦІЯ ТА АВТОРИЗАЦІЯ =================
        function checkAdminPassword() {
            // Для входу просто впиши свій поточний пароль від адмінки
            if(document.getElementById('admin-pass').value.length > 0) { 
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('choice-screen').style.display = 'flex';
                loadCloudData();
            } else {
                alert('Введіть пароль!');
            }
        }

        function logoutAdmin() {
            document.getElementById('choice-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('admin-pass').value = '';
        }

        function openInterface(type) {
            document.getElementById('choice-screen').style.display = 'none';
            if(type === 'movies') {
                document.getElementById('admin-interface').style.display = 'block';
            } else {
                document.getElementById('users-interface').style.display = 'block';
            }
        }

        function backToChoice() { 
            document.getElementById('admin-interface').style.display = 'none'; 
            document.getElementById('users-interface').style.display = 'none'; 
            document.getElementById('choice-screen').style.display = 'flex'; 
        } 

        function switchMovieTab(tab) { 
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); 
            if(tab === 'add') { 
                document.querySelectorAll('.tab-btn')[0].classList.add('active'); 
                document.getElementById('tab-add').classList.add('active'); 
            } else { 
                document.querySelectorAll('.tab-btn')[1].classList.add('active'); 
                document.getElementById('tab-edit').classList.add('active'); 
            } 
        } 

        function showLoader(show) { 
            document.getElementById('loader').style.display = show ? 'block' : 'none'; 
        }

        // ================= ВЗАЄМОДІЯ З ХМАРОЮ =================
        async function loadCloudData() {
            showLoader(true);
            try {
                // Завантаження фільмів
                const resMovies = await fetch(`https://api.jsonbin.io/v3/b/${MOVIES_BIN_ID}/latest`, { headers: { 'X-Master-Key': CLOUD_API_KEY, 'Cache-Control': 'no-cache' } });
                const dataMovies = await resMovies.json();
                cloudMovies = dataMovies.record.movies || dataMovies.record;
                if(!Array.isArray(cloudMovies)) cloudMovies = [];
                filterEditMovies();

                // Завантаження користувачів
                const resUsers = await fetch(`https://api.jsonbin.io/v3/b/${USERS_BIN_ID}/latest`, { headers: { 'X-Master-Key': CLOUD_API_KEY, 'Cache-Control': 'no-cache' } });
                const dataUsers = await resUsers.json();
                cloudUsers = dataUsers.record || {};
                filterUsers();
            } catch(e) {
                console.error("Помилка завантаження даних:", e);
            }
            showLoader(false);
        }

        async function saveMoviesToCloud() {
            showLoader(true);
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${MOVIES_BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': CLOUD_API_KEY },
                    body: JSON.stringify(cloudMovies)
                });
                filterEditMovies();
            } catch(e) { alert('Помилка збереження!'); }
            showLoader(false);
        }

        async function saveUsersToCloud() {
            showLoader(true);
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${USERS_BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': CLOUD_API_KEY },
                    body: JSON.stringify(cloudUsers)
                });
            } catch(e) { alert('Помилка збереження!'); }
            showLoader(false);
            alert('Збережено!');
        }

        // ================= КЕРУВАННЯ ФІЛЬМАМИ =================
        function filterEditMovies() {
            const query = document.getElementById('edit-movie-search').value.toLowerCase();
            const select = document.getElementById('edit-select');
            select.innerHTML = '<option value="">-- Оберіть фільм --</option>';
            cloudMovies.forEach(m => {
                if((m.title || '').toLowerCase().includes(query)) {
                    select.innerHTML += `<option value="${m.id}">${m.title} (${m.year})</option>`;
                }
            });
        }

        // 1. ФУНКЦІЯ ПІДТЯГУВАННЯ ДАНИХ 
        function loadMovieData() {
            const id = document.getElementById('edit-select').value;
            if(!id) { document.getElementById('edit-form').style.display = 'none'; return; }
            document.getElementById('edit-form').style.display = 'block';

            const m = cloudMovies.find(movie => String(movie.id) === String(id));
            if(!m) return;

            document.getElementById('edit-title').value = m.title || '';
            document.getElementById('edit-year').value = m.year || '';
            document.getElementById('edit-genre').value = m.genre || '';
            
            document.getElementById('edit-desc').value = m.desc || m.description || '';
            document.getElementById('edit-rating').value = m.rating || '';
            document.getElementById('edit-poster').value = m.img || m.poster || '';
            
            document.getElementById('edit-video-1080').value = m.video_1080 || m.video1080 || m.media1080 || '';
            document.getElementById('edit-video-720').value = m.video_720 || m.video720 || m.media720 || '';
            
            document.getElementById('edit-tags').value = (m.tags && Array.isArray(m.tags)) ? m.tags.join(', ') : '';
        }

        // 2. ФУНКЦІЯ ЗБЕРЕЖЕННЯ ВІДРЕДАГОВАНОГО ФІЛЬМУ
        function saveEditMovie() {
            const id = document.getElementById('edit-select').value;
            if(!id) return;
            const index = cloudMovies.findIndex(movie => String(movie.id) === String(id));
            if(index === -1) return;

            cloudMovies[index].title = document.getElementById('edit-title').value;
            cloudMovies[index].year = document.getElementById('edit-year').value;
            cloudMovies[index].genre = document.getElementById('edit-genre').value;
            cloudMovies[index].desc = document.getElementById('edit-desc').value;
            cloudMovies[index].rating = document.getElementById('edit-rating').value;
            cloudMovies[index].img = document.getElementById('edit-poster').value;
            cloudMovies[index].video_1080 = document.getElementById('edit-video-1080').value;
            cloudMovies[index].video_720 = document.getElementById('edit-video-720').value;
            
            const tagsInput = document.getElementById('edit-tags').value;
            cloudMovies[index].tags = tagsInput ? tagsInput.split(',').map(t => t.trim()) : [""];

            saveMoviesToCloud();
            alert('Зміни збережено!');
        }

        // 3. ФУНКЦІЯ ДОДАВАННЯ НОВОГО ФІЛЬМУ
        function addMovie() {
            const tagsInput = document.getElementById('add-tags').value;
            
            const newMovie = {
                id: Date.now(),
                title: document.getElementById('add-title').value,
                year: document.getElementById('add-year').value,
                genre: document.getElementById('add-genre').value,
                desc: document.getElementById('add-desc').value,
                rating: document.getElementById('add-rating').value,
                img: document.getElementById('add-poster').value,
                video_1080: document.getElementById('add-video-1080').value,
                video_720: document.getElementById('add-video-720').value,
                tags: tagsInput ? tagsInput.split(',').map(t => t.trim()) : [""],
                views: 0
            };

            if(!newMovie.title) return alert('Введіть назву фільму!');

            cloudMovies.push(newMovie);
            saveMoviesToCloud();

            // Очищуємо поля
            document.getElementById('add-title').value = '';
            document.getElementById('add-year').value = '';
            document.getElementById('add-genre').value = '';
            document.getElementById('add-desc').value = '';
            document.getElementById('add-rating').value = '';
            document.getElementById('add-poster').value = '';
            document.getElementById('add-video-1080').value = '';
            document.getElementById('add-video-720').value = '';
            document.getElementById('add-tags').value = '';

            alert('Фільм успішно додано!');
        }

        function deleteMovie() {
            const id = document.getElementById('edit-select').value;
            if(!id) return;
            if(confirm('Ви точно хочете видалити цей фільм?')) {
                cloudMovies = cloudMovies.filter(m => String(m.id) !== String(id));
                document.getElementById('edit-form').style.display = 'none';
                saveMoviesToCloud();
            }
        }

        // ================= КЕРУВАННЯ КОРИСТУВАЧАМИ =================
        function filterUsers() {
            const query = document.getElementById('user-search').value.toLowerCase();
            const select = document.getElementById('user-select');
            select.innerHTML = '<option value="">-- Оберіть користувача --</option>';
            Object.keys(cloudUsers).forEach(username => {
                if(username.toLowerCase().includes(query)) {
                    select.innerHTML += `<option value="${username}">${username}</option>`;
                }
            });
        }

        function loadUserData() {
            currentSelectedUser = document.getElementById('user-select').value;
            if(!currentSelectedUser) { document.getElementById('user-form').style.display = 'none'; return; }
            document.getElementById('user-balance').value = cloudUsers[currentSelectedUser].balance || 0;
            document.getElementById('user-form').style.display = 'block';
        }

        function saveUserBalance() {
            if(!currentSelectedUser) return;
            cloudUsers[currentSelectedUser].balance = parseInt(document.getElementById('user-balance').value) || 0;
            saveUsersToCloud();
        }

        function deleteUser() {
            if(!currentSelectedUser) return;
            if(confirm(`Повністю видалити акаунт "${currentSelectedUser}"?`)) {
                delete cloudUsers[currentSelectedUser];
                document.getElementById('user-form').style.display = 'none';
                currentSelectedUser = "";
                filterUsers();
                saveUsersToCloud();
            }
        }

        // Імітація завантаження відео для адмінки
        function simulateVideoUpload(input, targetId, progressId, statusId) {
            if(input.files && input.files[0]) {
                const file = input.files[0];
                document.getElementById(progressId).style.display = 'block';
                document.getElementById(statusId).style.display = 'block';
                document.getElementById(statusId).innerText = `Завантаження ${file.name}...`;
                
                let progress = 0;
                const bar = document.getElementById(progressId).querySelector('.progress-bar');
                
                const interval = setInterval(() => {
                    progress += Math.random() * 20;
                    if(progress >= 100) {
                        progress = 100;
                        clearInterval(interval);
                        document.getElementById(statusId).innerText = 'Успішно завантажено! (Імітація)';
                        document.getElementById(statusId).style.color = '#28a745';
                        document.getElementById(targetId).value = file.name;
                        setTimeout(() => {
                            document.getElementById(progressId).style.display = 'none';
                        }, 2000);
                    }
                    bar.style.width = progress + '%';
                }, 300);
            }
        }
    </script>
</body>
</html>

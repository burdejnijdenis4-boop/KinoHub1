<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinoHub - Перегляд фільму</title>
    <link rel="stylesheet" href="s1.css">
    <style>
        /* === БАЗОВІ СТИЛІ СТОРІНКИ ПЕРЕГЛЯДУ === */
        body {
            background: #0a0f1e;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            margin-top: 40px;
            background: rgba(26, 34, 51, 0.75);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid rgba(74, 144, 226, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: #4a90e2;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #ffd700;
        }

        .movie-header {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }

        .movie-poster-wrapper {
            flex: 0 0 250px;
        }

        .movie-poster-wrapper img {
            width: 100%;
            border-radius: 10px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .movie-details-info {
            flex: 1;
        }

        h1 {
            margin-top: 0;
            color: #4a90e2;
            font-size: 32px;
            text-shadow: 0 0 10px rgba(74, 144, 226, 0.3);
        }

        .meta-tags-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .meta-tag {
            background: rgba(74, 144, 226, 0.15);
            border: 1px solid rgba(74, 144, 226, 0.4);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #ffd700;
        }

        .movie-description {
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 20px;
        }

        /* Керування плеєром та якістю */
        .player-control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111827;
            padding: 15px 20px;
            border-radius: 10px 10px 0 0;
            border: 1px solid rgba(255,255,255,0.05);
            border-bottom: none;
        }

        .panel-title {
            font-weight: bold;
            color: #4a90e2;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #quality-selector {
            background: #1f2937;
            color: white;
            border: 1px solid #4a90e2;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            outline: none;
        }

        #player-container {
            width: 100%;
            background: #000;
            border-radius: 0 0 10px 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            margin-bottom: 40px;
        }

        /* Рейтинг зірочками */
        .rating-block {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stars-container {
            display: flex;
            gap: 5px;
        }

        .star {
            font-size: 26px;
            cursor: pointer;
            color: #555;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .star:hover {
            transform: scale(1.2);
        }

        .rating-stats-text {
            font-size: 14px;
            color: #9ca3af;
        }

        /* Секція коментарів */
        .comments-section {
            margin-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 30px;
        }

        .comment-form textarea {
            width: 100%;
            background: #111827;
            border: 1px solid #4a90e2;
            color: white;
            padding: 15px;
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 12px;
            outline: none;
        }

        .comment-btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .comment-btn:hover {
            background: #357abd;
        }

        #local-comments-list {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .comment-item {
            background: #111827;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #4a90e2;
        }

        .comment-meta {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .comment-text {
            color: #e5e7eb;
            line-height: 1.4;
        }

        /* === ДОДАТКОВІ ФІКСИ ДРІБНИХ ТЕМНИХ ЕЛЕМЕНТІВ === */
        body.light-theme .container {
            background: rgba(255, 255, 255, 0.95) !important;
            border-color: #cbd5e1 !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1) !important;
        }

        body.light-theme .meta-tag {
            background: #e2e8f0 !important;
            border-color: #cbd5e1 !important;
            color: #1e3a8a !important; 
        }

        body.light-theme #quality-selector {
            background: #ffffff !important;
            color: #1a2233 !important;
            border-color: #cbd5e1 !important;
        }

        body.light-theme .player-control-panel {
            background: #f1f5f9 !important;
            color: #111827 !important;
        }

        body.light-theme .movie-description {
            color: #334155 !important;
        }

        body.light-theme .comment-form textarea {
            background: #ffffff !important;
            color: #000000 !important;
            border-color: #cbd5e1 !important;
        }

        body.light-theme #local-comments-list > div {
            background: #ffffff !important;
            border: 1px solid #e2e8f0 !important;
            color: #000000 !important;
        }
        
        body.light-theme .comment-text {
            color: #1f2937 !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link">❮ На головну сторінку</a>

        <div class="movie-header">
            <div class="movie-poster-wrapper">
                <img id="movie-poster" src="" alt="Постер фільму">
            </div>
            <div class="movie-details-info">
                <h1 id="movie-title">Завантаження стрічки...</h1>
                <div class="meta-tags-row">
                    <span id="movie-year" class="meta-tag">-</span>
                    <span id="movie-genre" class="meta-tag">-</span>
                    <span class="meta-tag" style="color: #4a90e2; font-weight: bold;">Full HD / HD</span>
                </div>
                <p id="movie-description" class="movie-description">
                    Будь ласка, зачекайте. Синхронізуємо дані з хмарною базою даних KinoHub...
                </p>

                <div class="rating-block">
                    <span style="font-weight: bold; color: #ffd700;">Оцінка сайту:</span>
                    <div id="star-container" class="stars-container"></div>
                    <span id="rating-stats" class="rating-stats-text">(0 голосів, середня: 0.0)</span>
                </div>
            </div>
        </div>

        <div class="player-control-panel">
            <div class="panel-title">🎬 Онлайн-плеєр KinoHub</div>
            <div>
                <label for="quality-selector" style="margin-right: 8px; font-size: 14px; color: #9ca3af;">Якість:</label>
                <select id="quality-selector" onchange="switchVideoQuality()">
                    <option value="1080">1080p (Full HD)</option>
                    <option value="720">720p (HD)</option>
                </select>
            </div>
        </div>

        <div id="player-container"></div>

        <div class="comments-section">
            <h2 style="color: #4a90e2; margin-bottom: 20px;">💬 Відгуки глядачів</h2>
            
            <div class="comment-form">
                <textarea id="comment-input" rows="3" placeholder="Залиште свій відгук про цей фільм..."></textarea>
                <button class="comment-btn" onclick="addComment()">Надіслати відгук</button>
            </div>

            <div id="local-comments-list">
                </div>
        </div>
    </div>

    <script>
        // --- КОНФІГУРАЦІЯ API ТА ХМАРИ ---
        const CLOUD_API_KEY = '$2a$10$2XqOLrSsXthcKg925l/Sk.6PqMKbqGF/XzRytUJtSw29fDlVNGouq'; 
        const MOVIES_BIN_ID = '6a24577af5f4af5e29c32cf6';
        const COMMENTS_BIN_ID = '6a2f2a5ef5f4af5e29f1fa87';

        window.currentMovieData = null; // Глобальний об'єкт для поточної стрічки
        let movieId = "";

        // --- 1. ІНІЦІАЛІЗАЦІЯ СТОРІНКИ ---
        async function initMoviePage() {
            // Перевіряємо збережену тему з локалстореджу
            if (localStorage.getItem('light_theme') === 'true') {
                document.body.classList.add('light-theme');
            }

            // Отримуємо id фільму з адресного рядка сайту
            const urlParams = new URLSearchParams(window.location.search);
            movieId = urlParams.get('id');

            if (!movieId) {
                alert("Фільм не знайдено в запиті!");
                window.location.href = "index.html";
                return;
            }

            try {
                // Завантажуємо актуальний каталог стрічок з хмари
                const response = await fetch(`https://api.jsonbin.io/v3/b/${MOVIES_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': CLOUD_API_KEY, 'Cache-Control': 'no-cache' }
                });
                const resData = await response.json();
                const movies = resData.record.movies || resData.record;

                // Шукаємо потрібну стрічку за її унікальним ID
                const movie = movies.find(m => m.id === movieId);

                if (!movie) {
                    document.getElementById('movie-title').innerText = "Стрічку не знайдено";
                    return;
                }

                // Зберігаємо фільм у глобальну змінну для доступу плеєра
                window.currentMovieData = movie;

                // Заповнюємо інтерфейс інформацією про фільм
                document.getElementById('movie-title').innerText = movie.title;
                document.getElementById('movie-year').innerText = movie.year + " рік";
                document.getElementById('movie-genre').innerText = movie.genre;
                document.getElementById('movie-description').innerText = movie.description || "Опис відсутній.";
                document.getElementById('movie-poster').src = movie.poster || "https://via.placeholder.com/250x375";

                // Ініціалізуємо відео-плеєр
                switchVideoQuality();

                // Ініціалізуємо модулі оцінок та коментарів
                initRatingSystem();
                loadComments();

            } catch (err) {
                console.error("Критична помилка завантаження даних фільму:", err);
                document.getElementById('movie-description').innerText = "Не вдалося завантажити дані з сервера. Перевірте з'єднання.";
            }
        }

        // --- 2. ЛОГІКА РОЗУМНОГО МЕДІАПЛЕЄРА (1080p / 720p) ---
        function switchVideoQuality() {
            if (!window.currentMovieData) return;
            
            const qualitySelector = document.getElementById('quality-selector');
            const quality = qualitySelector ? qualitySelector.value : '1080';
            const playerContainer = document.getElementById('player-container');
            if (!playerContainer) return;
            
            const movie = window.currentMovieData;
            let videoUrl = "";

            // Вибір правильного лінка залежно від обраної якості
            if (quality === '720' && movie.video720) {
                videoUrl = movie.video720;
            } else {
                // Пріоритет на нове поле 1080p, або старе сумісне поле videoUrl
                videoUrl = movie.video1080 || movie.videoUrl;
            }

            // Безпечна авто-конвертація стандартних лінків YouTube у вбудований embed-формат
            if (videoUrl && videoUrl.includes('youtube.com/watch?v=')) {
                try {
                    const videoId = videoUrl.split('v=')[1].split('&')[0];
                    videoUrl = `https://www.youtube.com/embed/${videoId}`;
                } catch (err) {
                    console.error("Помилка парсингу YouTube лінка:", err);
                }
            }

            // Плавна кінематографічна анімація зміни відео (Ефект затемнення)
            playerContainer.style.transition = 'opacity 0.3s ease';
            playerContainer.style.opacity = '0';
            
            setTimeout(() => {
                if (videoUrl) {
                    playerContainer.innerHTML = `
                        <iframe 
                            src="${videoUrl}" 
                            width="100%" 
                            height="500px" 
                            frameborder="0" 
                            allowfullscreen 
                            style="border-radius: 0 0 10px 10px; border: none;">
                        </iframe>`;
                } else {
                    // Інтерактивна заглушка відсутності потрібної якості
                    playerContainer.innerHTML = `
                        <div style="height: 500px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111827; color: #ffd700;">
                            <span style="font-size: 50px; margin-bottom: 15px;">🎬</span>
                            <b style="font-size: 18px;">Відео у якості ${quality}p відсутнє для цієї стрічки</b>
                            <span style="color: #6b7280; font-size: 14px; margin-top: 5px;">Будь ласка, перемкніться на іншу якість у меню вище</span>
                        </div>`;
                }
                playerContainer.style.opacity = '1';
            }, 300);
        }

        // --- 3. СИСТЕМА ОЦІНОК ЗІРОЧКАМИ (ЛОКАЛЬНА) ---
        function initRatingSystem() {
            const starContainer = document.getElementById('star-container');
            const statsText = document.getElementById('rating-stats');
            if (!starContainer) return;

            let stats = JSON.parse(localStorage.getItem('rating_stats_' + movieId)) || { sum: 0, count: 0 };
            let userVote = localStorage.getItem('user_vote_' + movieId);

            function renderStars() {
                starContainer.innerHTML = '';
                const currentAvg = stats.count > 0 ? (stats.sum / stats.count) : 0;
                statsText.innerText = `(${stats.count} голосів, середня: ${currentAvg.toFixed(1)})`;

                for (let i = 1; i <= 5; i++) {
                    const star = document.createElement('span');
                    star.className = 'star';
                    star.innerHTML = '★';
                    
                    // Фарбуємо зірки за середнім рейтингом або вибором користувача
                    star.style.color = i <= Math.round(currentAvg) ? '#ffd700' : '#4b5563';

                    if (!userVote) {
                        // Додаємо інтерактивні ефекти наведення миші
                        star.addEventListener('mouseenter', () => {
                            Array.from(starContainer.children).forEach((s, index) => {
                                s.style.color = index < i ? '#ffd700' : '#4b5563';
                            });
                        });
                        
                        star.addEventListener('mouseleave', () => {
                            Array.from(starContainer.children).forEach((s, index) => {
                                s.style.color = index < Math.round(currentAvg) ? '#ffd700' : '#4b5563';
                            });
                        });

                        // Обробка кліку (голосування)
                        star.addEventListener('click', () => {
                            userVote = i;
                            localStorage.setItem('user_vote_' + movieId, i);
                            
                            stats.sum += i;
                            stats.count += 1;
                            localStorage.setItem('rating_stats_' + movieId, JSON.stringify(stats));
                            
                            renderStars(); 
                        });
                    } else {
                        star.style.cursor = 'default';
                        star.style.transform = 'none';
                    }

                    starContainer.appendChild(star);
                }
            }

            renderStars();
        }

        // --- 4. ХМАРНА СИСТЕМА ВІДГУКІВ ТА КОМЕНТАРІВ ---
        async function loadComments() {
            const listContainer = document.getElementById('local-comments-list');
            if (!listContainer) return;

            listContainer.innerHTML = '<div style="color: #6b7280;">⏳ Завантаження відгуків...</div>';

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${COMMENTS_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': CLOUD_API_KEY, 'Cache-Control': 'no-cache' }
                });
                const data = await response.json();
                const allComments = data.record || {};

                // Отримуємо масив коментарів виключно для поточної стрічки
                const movieComments = allComments[movieId] || [];

                listContainer.innerHTML = '';

                if (movieComments.length === 0) {
                    listContainer.innerHTML = '<div style="color: #6b7280; font-style: italic;">Тут ще немає жодного відгуку. Будьте першим, хто поділиться враженнями!</div>';
                    return;
                }

                // Виводимо коментарі у зворотньому порядку (нові зверху)
                movieComments.slice().reverse().forEach(c => {
                    listContainer.innerHTML += `
                        <div class="comment-item">
                            <div class="comment-meta">
                                <span>👤 ${c.user || 'Глядач KinoHub'}</span>
                                <span>📅 ${c.date || 'Нещодавно'}</span>
                            </div>
                            <div class="comment-text">${c.text}</div>
                        </div>`;
                });

            } catch (err) {
                console.error("Помилка завантаження відгуків з хмари:", err);
                listContainer.innerHTML = '<div style="color: #dc3545;">Помилка завантаження списку коментарів.</div>';
            }
        }

        async function addComment() {
            const input = document.getElementById('comment-input');
            if (!input) return;

            const text = input.value.trim();
            if (!text) {
                alert("Неможливо надіслати порожній відгук!");
                return;
            }

            // Зчитуємо активну сесію користувача (sessionStorage)
            const activeUser = sessionStorage.getItem('secureUser') || 'Анонім';

            try {
                // Спочатку стягуємо поточну повну базу коментарів
                const response = await fetch(`https://api.jsonbin.io/v3/b/${COMMENTS_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': CLOUD_API_KEY, 'Cache-Control': 'no-cache' }
                });
                const resData = await response.json();
                const allComments = resData.record || {};

                if (!allComments[movieId]) {
                    allComments[movieId] = [];
                }

                // Створюємо структуру нового коментаря
                const newCommentObj = {
                    user: activeUser,
                    text: text,
                    date: new Date().toLocaleDateString('uk-UA', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' })
                };

                allComments[movieId].push(newCommentObj);

                // Заливаем оновлений об'єкт назад у хмару JSONBin
                await fetch(`https://api.jsonbin.io/v3/b/${COMMENTS_BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': CLOUD_API_KEY },
                    body: JSON.stringify(allComments)
                });

                input.value = ''; // Очищуємо текстове поле
                loadComments();   // Перемальовуємо блок відгуків

            } catch (err) {
                console.error("Помилка публікації коментаря:", err);
                alert("Помилка відправки! Спробуйте пізніше.");
            }
        }

        // Запуск логіки сторінки відразу після повного завантаження DOM
        document.addEventListener('DOMContentLoaded', initMoviePage);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinoHub - Перегляд фільму</title>
    <link rel="stylesheet" href="s1.css">
    <style>
        /* === БАЗОВІ СТИЛІ === */
        body { background: #0a0f1e; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 1000px; width: 100%; margin-top: 40px; background: rgba(26, 34, 51, 0.75); border-radius: 15px; padding: 30px; border: 1px solid rgba(74, 144, 226, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); box-sizing: border-box; }
        .back-link { display: inline-flex; align-items: center; color: #4a90e2; text-decoration: none; font-weight: bold; margin-bottom: 20px; transition: color 0.3s ease; }
        .back-link:hover { color: #ffd700; }
        
        /* === ПОСТЕР === */
        .movie-header { display: flex; gap: 30px; margin-bottom: 30px; align-items: flex-start; }
        .movie-poster-wrapper { flex: 0 0 250px; width: 250px; position: relative; }
        .movie-poster-wrapper img { 
            width: 100%; 
            min-height: 375px; 
            background-color: #111827; 
            object-fit: cover; 
            border-radius: 10px; 
            border: 2px solid #ffd700; 
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); 
            display: block;
        }
        
        /* === ПЛАШКА ПЕРЕГЛЯДІВ === */
        .views-badge {
            position: absolute; 
            top: 10px; 
            right: 10px; 
            background: rgba(0, 0, 0, 0.8); 
            color: #10b981; 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: bold; 
            border: 1px solid rgba(16, 185, 129, 0.5); 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
            backdrop-filter: blur(4px);
        }

        .movie-details-info { flex: 1; }
        h1 { margin-top: 0; color: #4a90e2; font-size: 32px; text-shadow: 0 0 10px rgba(74, 144, 226, 0.3); }
        .meta-tags-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .meta-tag { background: rgba(74, 144, 226, 0.15); border: 1px solid rgba(74, 144, 226, 0.4); padding: 5px 12px; border-radius: 20px; font-size: 14px; color: #ffd700; }
        .movie-description { line-height: 1.6; color: #cbd5e1; margin-bottom: 20px; }
        
        /* === ПЛЕЄР === */
        .player-control-panel { display: flex; justify-content: space-between; align-items: center; background: #111827; padding: 15px 20px; border-radius: 10px 10px 0 0; border: 1px solid rgba(255,255,255,0.05); border-bottom: none; }
        .panel-title { font-weight: bold; color: #4a90e2; display: flex; align-items: center; gap: 8px; }
        #quality-selector { background: #1f2937; color: white; border: 1px solid #4a90e2; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; outline: none; }
        #player-container { width: 100%; background: #000; border-radius: 0 0 10px 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-bottom: 40px; }
        
        /* === ЗІРОЧКИ === */
        .rating-block { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
        .stars-container { display: flex; gap: 5px; min-height: 30px; } 
        .star { font-size: 26px; cursor: pointer; color: #555; transition: transform 0.2s ease, color 0.2s ease; }
        .star:hover { transform: scale(1.2); }
        .rating-stats-text { font-size: 14px; color: #9ca3af; }
        
        /* === КОМЕНТАРІ === */
        .comments-section { margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; }
        .comment-form textarea { width: 100%; background: #111827; border: 1px solid #4a90e2; color: white; padding: 15px; border-radius: 8px; resize: none; box-sizing: border-box; margin-bottom: 12px; outline: none; }
        .comment-btn { background: #4a90e2; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.3s ease; }
        .comment-btn:hover { background: #357abd; }
        #local-comments-list { margin-top: 25px; display: flex; flex-direction: column; gap: 15px; }
        .comment-item { background: #111827; padding: 15px; border-radius: 8px; border-left: 4px solid #4a90e2; }
        .comment-meta { display: flex; justify-content: space-between; font-size: 13px; color: #ffd700; margin-bottom: 8px; }
        .comment-text { color: #e5e7eb; line-height: 1.4; }

        /* === АДАПТИВНІСТЬ === */
        @media (max-width: 768px) {
            .movie-header { flex-direction: column; align-items: center; text-align: center; }
            .player-control-panel { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link">❮ На головну сторінку</a>

        <div class="movie-header">
            <div class="movie-poster-wrapper">
                <img id="movie-poster" src="" alt="">
                <div class="views-badge">
                    👁 <span id="views-count">0</span>
                </div>
            </div>
            <div class="movie-details-info">
                <h1 id="movie-title">Завантаження стрічки...</h1>
                <div class="meta-tags-row">
                    <span id="movie-year" class="meta-tag">-</span>
                    <span id="movie-genre" class="meta-tag">-</span>
                    <span class="meta-tag" style="color: #4a90e2; font-weight: bold;">Full HD / HD</span>
                </div>
                <p id="movie-description" class="movie-description">Зачекайте. Синхронізуємо дані...</p>

                <div class="rating-block">
                    <span style="font-weight: bold; color: #ffd700;">Оцінка сайту:</span>
                    <div id="star-container" class="stars-container"></div>
                    <span id="rating-stats" class="rating-stats-text">(0 голосів, середня: 0.0)</span>
                </div>
            </div>
        </div>

        <div class="player-control-panel">
            <div class="panel-title">🎬 Онлайн-плеєр KinoHub</div>
            <div>
                <label for="quality-selector" style="margin-right: 8px; font-size: 14px; color: #9ca3af;">Якість:</label>
                <select id="quality-selector" onchange="switchVideoQuality()">
                    <option value="1080">1080p (Full HD)</option>
                    <option value="720">720p (HD)</option>
                </select>
            </div>
        </div>

        <div id="player-container"></div>

        <div class="comments-section">
            <h2 style="color: #4a90e2; margin-bottom: 20px;">💬 Відгуки глядачів</h2>
            <div class="comment-form">
                <textarea id="comment-input" rows="3" placeholder="Залиште свій відгук..."></textarea>
                <button class="comment-btn" onclick="addComment()">Надіслати відгук</button>
            </div>
            <div id="local-comments-list"></div>
        </div>
    </div>

    <script>
        // === ВСТАВ СЮДИ СВІЙ ПРАВИЛЬНИЙ API КЛЮЧ ===
        const CLOUD_API_KEY = 'ВСТАВ_СЮДИ_СВІЙ_ПРАВИЛЬНИЙ_API_КЛЮЧ'; 
        const MOVIES_BIN_ID = '6a30d6c1da38895dfec7a3be';
        const COMMENTS_BIN_ID = '6a2f2a5ef5f4af5e29f1fa87';

        window.currentMovieData = null; 
        let movieId = "";

       // === ГЛОБАЛЬНИЙ ЛІЧИЛЬНИК ПЕРЕГЛЯДІВ ===
        async function incrementMovieViews(currentMovieId) {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${MOVIES_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': CLOUD_API_KEY, 'Cache-Control': 'no-cache' }
                });
                const data = await response.json();
                let movies = data.record.movies || data.record;

                let movieIndex = movies.findIndex(m => String(m.id) === String(currentMovieId));
                
                if (movieIndex !== -1) {
                    movies[movieIndex].views = (parseInt(movies[movieIndex].views) || 0) + 1;

                    await fetch(`https://api.jsonbin.io/v3/b/${MOVIES_BIN_ID}`, {
                        method: 'PUT',
                        headers: { 
                            'Content-Type': 'application/json',
                            'X-Master-Key': CLOUD_API_KEY 
                        },
                        body: JSON.stringify(movies)
                    });

                    document.getElementById('views-count').innerText = movies[movieIndex].views;
                }
            } catch (err) {
                console.error("Помилка при оновленні переглядів:", err);
            }
        }

        // === 1. ГОЛОВНА ФУНКЦІЯ ЗАВАНТАЖЕННЯ ===
        async function initMoviePage() {
            try {
                if (localStorage.getItem('light_theme') === 'true') document.body.classList.add('light-theme');
            } catch(e) {}

            const urlParams = new URLSearchParams(window.location.search);
            movieId = urlParams.get('id');

            if (!movieId) {
                document.getElementById('movie-title').innerText = "Фільм не обрано";
                document.getElementById('movie-description').innerText = "Схоже, ви відкрили цю сторінку напряму. Будь ласка, перейдіть на головну сторінку та оберіть фільм із каталогу.";
                return;
            }

            incrementMovieViews(movieId);

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${MOVIES_BIN_ID}/latest`, { 
                    headers: { 'X-Master-Key': CLOUD_API_KEY, 'Cache-Control': 'no-cache' } 
                });
                if (!response.ok) throw new Error("Помилка з'єднання");

                const resData = await response.json();
                let movies = resData.record.movies || resData.record;
                if (!Array.isArray(movies)) movies = [];

                const movie = movies.find(m => m.id === movieId || m.id == movieId);
                
                if (!movie) {
                    document.getElementById('movie-title').innerText = "Стрічку не знайдено в базі";
                    document.getElementById('movie-description').innerText = "Можливо, цей фільм був видалений адміністратором.";
                    return;
                }

                // Заповнюємо дані (ВИПРАВЛЕНО desc та img)
                window.currentMovieData = movie;
                document.getElementById('movie-title').innerText = movie.title || "Без назви";
                document.getElementById('movie-year').innerText = movie.year ? movie.year + " рік" : "Рік невідомий";
                document.getElementById('movie-genre').innerText = movie.genre || "Жанр не вказано";
                
                // Використовуємо movie.desc, як в твоєму JSON
                document.getElementById('movie-description').innerText = movie.desc || movie.description || "Опис відсутній.";
                
                // Використовуємо movie.img, як в твоєму JSON
                if (movie.img || movie.poster) {
                    document.getElementById('movie-poster').src = movie.img || movie.poster;
                }

                document.getElementById('views-count').innerText = movie.views || 0;

                switchVideoQuality();
                loadComments();

            } catch (err) {
                console.error(err);
                document.getElementById('movie-title').innerText = "Помилка мережі";
                document.getElementById('movie-description').innerText = "Не вдалося з'єднатися з базою даних JSONBin. Перевірте підключення до інтернету.";
            }
        }

        // === 2. РОЗУМНИЙ ПЛЕЄР ===
        function switchVideoQuality() {
            const playerContainer = document.getElementById('player-container');
            const quality = document.getElementById('quality-selector').value;
            
            if (!window.currentMovieData) {
                playerContainer.innerHTML = `<div style="height: 500px; background: #111827; border-radius: 0 0 10px 10px;"></div>`;
                return;
            }
            
            const movie = window.currentMovieData;
            
            // Враховано нижнє підкреслення з JSON (video_1080, video_720)
            let mp4Url = quality === '720' ? (movie.media720 || movie.video_720) : (movie.media1080 || movie.video_1080);
            let iframeUrl = quality === '720' ? (movie.video720 || movie.video_720) : (movie.video1080 || movie.video_1080 || movie.videoUrl);

            playerContainer.style.transition = 'opacity 0.3s ease';
            playerContainer.style.opacity = '0';
            
            setTimeout(() => {
                if (mp4Url && mp4Url.trim() !== '') {
                    playerContainer.innerHTML = `
                        <video 
                            src="${mp4Url}" 
                            width="100%" 
                            height="500" 
                            controls 
                            controlsList="nodownload"
                            style="border-radius: 0 0 10px 10px; background: #000;">
                        </video>`;
                } else if (iframeUrl && iframeUrl.trim() !== '') {
                    if (iframeUrl.includes('youtube.com/watch?v=')) {
                        try {
                            const videoId = iframeUrl.split('v=')[1].split('&')[0];
                            iframeUrl = `https://www.youtube.com/embed/${videoId}`;
                        } catch (err) {}
                    }
                    playerContainer.innerHTML = `
                        <iframe 
                            src="${iframeUrl}" 
                            width="100%" 
                            height="500px" 
                            frameborder="0" 
                            allowfullscreen 
                            style="border-radius: 0 0 10px 10px; border: none;">
                        </iframe>`;
                } else {
                    playerContainer.innerHTML = `
                        <div style="height: 500px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111827; color: #ffd700;">
                            <span style="font-size: 50px; margin-bottom: 15px;">🎬</span>
                            <b style="font-size: 18px;">Відео у якості ${quality}p відсутнє</b>
                            <span style="color: #6b7280; font-size: 14px; margin-top: 5px;">Спробуйте обрати іншу якість</span>
                        </div>`;
                }
                playerContainer.style.opacity = '1';
            }, 300);
        }

        // === 3. ЗІРОЧКИ ОЦІНКИ (Тепер 10 штук) ===
        function initRatingSystem() {
            const starContainer = document.getElementById('star-container');
            const statsText = document.getElementById('rating-stats');
            if (!starContainer) return;

            const storageKey = 'rating_stats_' + (movieId || 'test');
            const voteKey = 'user_vote_' + (movieId || 'test');

            let stats = JSON.parse(localStorage.getItem(storageKey)) || { sum: 0, count: 0 };
            let userVote = localStorage.getItem(voteKey);

            function renderStars() {
                starContainer.innerHTML = '';
                const currentAvg = stats.count > 0 ? (stats.sum / stats.count) : 0;
                statsText.innerText = `(${stats.count} голосів, середня: ${currentAvg.toFixed(1)})`;

                // 10 зірочок
                for (let i = 1; i <= 10; i++) {
                    const star = document.createElement('span');
                    star.className = 'star';
                    star.innerHTML = '★';
                    star.style.color = i <= Math.round(currentAvg) ? '#ffd700' : '#4b5563';

                    if (!userVote) {
                        star.addEventListener('mouseenter', () => {
                            Array.from(starContainer.children).forEach((s, index) => s.style.color = index < i ? '#ffd700' : '#4b5563');
                        });
                        star.addEventListener('mouseleave', () => {
                            Array.from(starContainer.children).forEach((s, index) => s.style.color = index < Math.round(currentAvg) ? '#ffd700' : '#4b5563');
                        });
                        star.addEventListener('click', () => {
                            userVote = i; localStorage.setItem(voteKey, i);
                            stats.sum += i; stats.count += 1; localStorage.setItem(storageKey, JSON.stringify(stats));
                            renderStars(); 
                        });
                    } else {
                        star.style.cursor = 'default'; star.style.transform = 'none';
                    }
                    starContainer.appendChild(star);
                }
            }
            renderStars();
        }

        // === 4. КОМЕНТАРІ ===
        async function loadComments() {
            if(!movieId) return;
            const listContainer = document.getElementById('local-comments-list');
            if (!listContainer) return;
            listContainer.innerHTML = '<div style="color: #6b7280;">⏳ Завантаження...</div>';

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${COMMENTS_BIN_ID}/latest`, { headers: { 'X-Master-Key': CLOUD_API_KEY, 'Cache-Control': 'no-cache' } });
                const data = await response.json();
                const movieComments = (data.record || {})[movieId] || [];

                listContainer.innerHTML = '';
                if (movieComments.length === 0) {
                    listContainer.innerHTML = '<div style="color: #6b7280; font-style: italic;">Відгуків ще немає.</div>';
                    return;
                }
                movieComments.slice().reverse().forEach(c => {
                    listContainer.innerHTML += `<div class="comment-item"><div class="comment-meta"><span>👤 ${c.user || 'Глядач'}</span><span>📅 ${c.date}</span></div><div class="comment-text">${c.text}</div></div>`;
                });
            } catch (err) {
                listContainer.innerHTML = '<div style="color: #dc3545;">Помилка завантаження відгуків.</div>';
            }
        }

        async function addComment() {
            if(!movieId) return alert("Фільм не обрано, неможливо додати коментар.");
            const input = document.getElementById('comment-input');
            const text = input.value.trim();
            if (!text) return alert("Неможливо надіслати порожній відгук!");

            const activeUser = sessionStorage.getItem('secureUser') || 'Анонім';
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${COMMENTS_BIN_ID}/latest`, { headers: { 'X-Master-Key': CLOUD_API_KEY, 'Cache-Control': 'no-cache' } });
                const resData = await response.json();
                const allComments = resData.record || {};
                
                if (!allComments[movieId]) allComments[movieId] = [];
                allComments[movieId].push({ user: activeUser, text: text, date: new Date().toLocaleDateString('uk-UA', { day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' }) });

                await fetch(`https://api.jsonbin.io/v3/b/${COMMENTS_BIN_ID}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': CLOUD_API_KEY }, body: JSON.stringify(allComments) });
                input.value = ''; loadComments();
            } catch (err) { alert("Помилка відправки!"); }
        }

        // === ПОРЯДОК ЗАПУСКУ ===
        document.addEventListener('DOMContentLoaded', () => {
            initRatingSystem();
            switchVideoQuality();
            initMoviePage();
        });
    </script>
</body>
</html>

<!DOCTYPE html>

<head>

    <title>Магазин Аватарок</title>
    <link rel="stylesheet" href="s1.css">
    <style>
        /* Спільні стилі для всіх CSS-аватарок */
        .avatar-solid, .avatar-gradient, .avatar-flag {
            width: 80px; height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            display: flex; align-items: center; justify-content: center;
            box-sizing: border-box;
            overflow: hidden; /* Обрізає прапори по колу */
        }
        
        /* 1 РЯД: Суцільні кольори */
        .avatar-solid {
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        /* 2 РЯД: Градієнти */
        .avatar-gradient {
            border: 4px solid #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5), inset 0 0 10px rgba(0,0,0,0.2);
        }

        /* 3 РЯД: Прапори (Векторні SVG) */
        .avatar-flag {
            border: 3px solid #555;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .avatar-flag svg {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body class="shop-body">

        <span id="balance">0</span>

    <a href="index.html" class="back-link">← Повернутися до кінотеатру</a>

            </div>
            <div class="avatar-item">

            <div class="avatar-item">

    <script src="s1.js"></script>
    <script>
        // 1. Функція для купівлі та встановлення аватарки
        async function handleAvatarAction(avatarData, price, btnElement) {
            const currentUser = sessionStorage.getItem('secureUser');
            if (!currentUser) {
                alert("Увійдіть в акаунт, щоб здійснювати покупки!");
                return;
            }

            try {
                const originalText = btnElement.innerText;
                btnElement.innerText = "Зачекайте...";
                btnElement.disabled = true;

                const users = await loadUsersFromCloud();
                if (!users || !users[currentUser]) {
                    alert("Помилка завантаження профілю.");
                    btnElement.innerText = originalText;
                    btnElement.disabled = false;
                    return;
                }

                let user = users[currentUser];
                if (!user.inventory) user.inventory = [];

                // Перевіряємо, чи вже куплено
                const isOwned = user.inventory.some(item => item.id === avatarData);

                if (isOwned) {
                    // ЯКЩО ВЖЕ КУПЛЕНО - ВДЯГАЄМО
                    user.avatar = avatarData;
                    await saveUsersToCloud(users);
                    
                    // ВАЖЛИВО: Синхронізуємо з профілем!
                    localStorage.setItem("selectedAvatar", avatarData);
                    
                    alert("✅ Аватарку успішно вдягнено!");
                    
                    // Оновлюємо вигляд кнопок (Вдягнено / Вдягнути)
                    document.querySelectorAll('.buy-btn').forEach(b => {
                        const onclickAttr = b.getAttribute('onclick');
                        if(onclickAttr && onclickAttr.includes(avatarData)) {
                            b.innerText = "Вдягнено";
                            b.style.background = "#28a745"; // Зелений
                        } else if (onclickAttr) {
                            const match = onclickAttr.match(/'([^']+)'/);
                            if(match && user.inventory.some(i => i.id === match[1])) {
                                b.innerText = "Вдягнути";
                                b.style.background = "#4a90e2"; // Синій
                            }
                        }
                    });
                } else {
                    // ЯКЩО НЕ КУПЛЕНО - КУПУЄМО
                    if (user.balance < price) {
                        alert("❌ Недостатньо монет!");
                        btnElement.innerText = originalText;
                        btnElement.disabled = false;
                        return;
                    }
                    
                    user.balance -= price;
                    user.inventory.push({ id: avatarData, name: "Аватар", url: avatarData });
                    user.avatar = avatarData; 
                    
                    await saveUsersToCloud(users);
                    
                    // ВАЖЛИВО: Синхронізуємо баланс та аватарку з профілем!
                    localStorage.setItem("selectedAvatar", avatarData);
                    localStorage.setItem("userBalance", user.balance);
                    
                    const balanceEl = document.getElementById('balance');
                    if(balanceEl) balanceEl.innerText = user.balance.toLocaleString();
                    
                    alert("🎉 Успішна покупка! Аватарку встановлено.");
                    btnElement.innerText = "Вдягнено";
                    btnElement.style.background = "#28a745";
                }
            } catch (error) {
                console.error("Помилка магазину:", error);
                alert("Сталася помилка при обробці запиту.");
                btnElement.innerText = "Помилка";
            } finally {
                btnElement.disabled = false; // Розблоковуємо кнопку
            }
        }

        // 2. При завантаженні сторінки перевіряємо, що вже куплено
        document.addEventListener('DOMContentLoaded', async () => {
            const currentUser = sessionStorage.getItem('secureUser');
            if (!currentUser) return;

            const users = await loadUsersFromCloud();
            if (!users || !users[currentUser]) return;
            
            const user = users[currentUser];
            
            const balanceEl = document.getElementById('balance');
            if(balanceEl && user.balance !== undefined) {
                balanceEl.innerText = user.balance.toLocaleString();
            }

            if (!user.inventory) return;

            // Відмальовуємо кнопки відповідно до статусу (Куплено/Вдягнено)
            document.querySelectorAll('.buy-btn').forEach(btn => {
                const onclickAttr = btn.getAttribute('onclick');
                if (!onclickAttr) return;
                
                const match = onclickAttr.match(/'([^']+)'/);
                if (match) {
                    const avatarId = match[1];
                    const isOwned = user.inventory.some(item => item.id === avatarId);
                    const isActive = user.avatar === avatarId;
                    
                    if (isActive) {
                        btn.innerText = "Вдягнено";
                        btn.style.background = "#28a745"; // Зелений
                    } else if (isOwned) {
                        btn.innerText = "Вдягнути";
                        btn.style.background = "#4a90e2"; // Синій
                    }
                }
            });
        });
    </script>

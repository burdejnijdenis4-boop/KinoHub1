    <style>
        /* Спільні стилі для всіх CSS-аватарок */
        .avatar-solid, .avatar-gradient, .avatar-flag {
            width: 80px; height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            display: flex; align-items: center; justify-content: center;
            box-sizing: border-box;
            overflow: hidden; /* Обрізає прапори по колу */
        }
        
        /* 1 РЯД: Суцільні кольори */
        .avatar-solid {
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        /* 2 РЯД: Градієнти */
        .avatar-gradient {
            border: 4px solid #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5), inset 0 0 10px rgba(0,0,0,0.2);
        }

        /* 3 РЯД: Прапори (Векторні SVG) */
        .avatar-flag {
            border: 3px solid #555;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .avatar-flag svg {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const currentUser = sessionStorage.getItem('secureUser');
        if (!currentUser) return;

        const users = await loadUsersFromCloud();
        const user = users[currentUser];
        if (!user || !user.inventory) return;

        // Перевіряємо кожну кнопку "Купити"
        document.querySelectorAll('.buy-btn').forEach(btn => {
            // Отримуємо ID аватара з onclick-атрибута (це трохи складно, але працює)
            const onclickAttr = btn.getAttribute('onclick');
            const avatarId = onclickAttr.split("'")[1]; 

            const isOwned = user.inventory.some(item => item.id === avatarId);
            if (isOwned) {
                btn.innerText = "Вдягнути"; // Або "Вдягнено"
                btn.style.background = "#28a745";
                btn.onclick = () => {
                    // Логіка простого вдягання без списання грошей
                    user.avatar = btn.parentElement.querySelector('.main-av').innerHTML;
                    saveUsersToCloud(users).then(() => alert("Аватарку змінено!"));
                };
            }
        });
    });
</script>
